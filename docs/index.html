<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WITH Commons</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f2ec;
  margin: 0;
  padding: 40px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 0;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #6f1d3a;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #59152e;
}

#message {
  margin-top: 10px;
  color: #6f1d3a;
}
</style>
</head>

<body>

<div class="container">
  <h2>WITH@50 Commons Login</h2>

  <h3>Register</h3>
  <input id="regName" placeholder="Name">
  <input id="regEmail" placeholder="Email">
  <input id="regPassword" type="password" placeholder="Password">
  <button onclick="register()">Register</button>

  <h3>Login</h3>
  <input id="logEmail" placeholder="Email">
  <input id="logPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="message"></div>
</div>

<script>
const API = "http://localhost:5000";

async function register() {
  const name = regName.value;
  const email = regEmail.value;
  const password = regPassword.value;

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name, email, password})
  });

  const data = await res.json();
  message.innerText = data.message;
}

async function login() {
  const email = logEmail.value;
  const password = logPassword.value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({email, password})
  });

  const data = await res.json();
  message.innerText = data.message;
}
</script>

</body>
</html>
