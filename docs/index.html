<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Mining Memory Login</title>
</head>

<body>
  <h1>Media Mining Memory</h1>

  <h2>Register</h2>
  <form id="registerForm">
    <input id="regName" type="text" placeholder="Name" required />
    <input id="regEmail" type="email" placeholder="Email" required />
    <input id="regPassword" type="password" placeholder="Password" required />
    <button id="registerBtn" type="submit">Register</button>
  </form>

  <h2>Login</h2>
  <form id="loginForm">
    <input id="logEmail" type="email" placeholder="Email" required />
    <input id="logPassword" type="password" placeholder="Password" required />
    <button id="loginBtn" type="submit">Login</button>
  </form>

  <p id="message"></p>

  <script>
    const API = "https://reports-on-mining-in-nigeria-production.up.railway.app/api";
    const TOKEN_KEY = "mmm_token";
    const USER_KEY = "mmm_user";

    const registerForm = document.getElementById("registerForm");
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    function setMessage(text) {
      message.textContent = text;
    }

    function storeAuth(data) {
      localStorage.setItem(TOKEN_KEY, data.token);
      localStorage.setItem(USER_KEY, JSON.stringify(data.user));
    }

    async function apiRequest(path, body) {
      const response = await fetch(`${API}${path}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || "Request failed.");
      }

      return data;
    }

    registerForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;

      try {
        setMessage("Creating account...");
        const data = await apiRequest("/auth/register", { name, email, password });
        storeAuth(data);
        setMessage("Registration successful. Redirecting...");
        window.location.href = "homepage.html";
      } catch (error) {
        setMessage(error.message);
      }
    });

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const email = document.getElementById("logEmail").value.trim();
      const password = document.getElementById("logPassword").value;

      try {
        setMessage("Signing in...");
        const data = await apiRequest("/auth/login", { email, password });
        storeAuth(data);
        setMessage("Login successful. Redirecting...");
        window.location.href = "homepage.html";
      } catch (error) {
        setMessage(error.message);
      }
    });
  </script>
</body>
</html>
